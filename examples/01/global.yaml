global:
  title: "Example 01: Simple dataset with only one CTD at a fixed depth"
  summary: "Simple dataset with only one CTD at a fixed depth. Metadata files are split in 4 yaml files: global, platforms, sensors and variables"
  institution: "UPC - Universitat Politècnica de Catalunya"
  institution_edmo_code: "2150"
  institution_ror_uri: "https://ror.org/03mb6wj31"
  Conventions: "OceanSITES EMSO CF-1.8"
  update_interval: "void"
  emso_site_name: "OBSEA"
  emso_regional_facility_name: "Balearic Sea"
  source: "mooring"
  data_type: "OceanSITES profile data"
  format_version: "1.4"
  network: "EMSO"
  data_mode: "D"
  projects: "DIGI4ECO GEORGE"
  project_codes: "101112883 101094716"
  principal_investigator: "Homer Simpson"
  principal_investigator_email: "homer.simpson@fake.com"
  license: "CC-BY-4.0"
  contributor_name: "Bart Simpson, Peter Griffin, Rick Sánchez"
  contributor_role: "DataCollector DataManager Researcher"
  data_processing_level: "L1"
  data_processing_sublevel: "L1b"

  keywords:
    - "Balearic Sea"   # found in "Observatories of the Seas Ontology"
    - "Electrical conductivity of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "OBSEA"   # found in "Observatories of the Seas Ontology"
    - "Salinity of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "Temperature of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "sea_water_electrical_conductivity"   # found in "Climate and Forecast Standard Names"
    - "sea_water_pressure"   # found in "Climate and Forecast Standard Names"
    - "sea_water_temperature"   # found in "Climate and Forecast Standard Names"
    # GCMD Science keywords
    - "EARTH SCIENCE > OCEANS > SALINITY/DENSITY > SALINITY"
    - "EARTH SCIENCE > OCEANS > OCEAN TEMPERATURE > WATER TEMPERATURE"
    - "EARTH SCIENCE > OCEANS > OCEAN PRESSURE > WATER PRESSURE"
    # GEMET
    - "physical oceanography"

  keywords_vocabulary:
    - "Observatories of the Seas Ontology"
    - "SeaDataNet Parameter Discovery Vocabulary"
    - "Climate and Forecast Standard Names"

  keywords_vocabulary_uri:
    - "https://earthportal.eu/ontologies/OSO"
    - "https://vocab.nerc.ac.uk/collection/P02/current/"
    - "https://vocab.nerc.ac.uk/collection/P07/current/"
