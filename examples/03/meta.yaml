global:
  title: "Example 03: Dataset with data from two CTDs swapped for maintenance"
  summary: "Time series with data from two CTDs swapped for maintenance, only one of them is deployed at a given time. Depth is constant "
  Conventions: "OceanSITES EMSO CF-1.8"
  institution: "UPC - Universitat Politècnica de Catalunya"
  institution_edmo_code: "2150"
  institution_ror_uri: "https://ror.org/03mb6wj31"
  update_interval: "void"
  emso_site_name: "OBSEA"
  emso_regional_facility_name: "Balearic Sea"
  source: "mooring"
  data_type: "OceanSITES profile data"
  format_version: "1.4"
  network: "EMSO"
  data_mode: "D"
  projects: "DIGI4ECO GEORGE"
  project_codes: "101112883 101094716"
  principal_investigator: "Homer Simpson"
  principal_investigator_email: "homer.simpson@fake.com"
  license: "CC-BY-4.0"
  contributor_name: "Bart Simpson, Peter Griffin, Rick Sánchez"
  contributor_role: "DataCollector DataManager Researcher"
  keywords:
    # Previous valid keywords
    # Suggested  additional keywords
    - "Balearic Sea"   # found in "Observatories of the Seas Ontology"
    - "CTD"   # found in "SeaDataNet device categories, Observatories of the Seas Ontology"
    - "Electrical conductivity of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "OBSEA"   # found in "Observatories of the Seas Ontology"
    - "Salinity of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "Temperature of the water column"   # found in "SeaDataNet Parameter Discovery Vocabulary"
    - "mooring"   # found in "SeaVoX Platform Categories"
    - "sea_water_electrical_conductivity"   # found in "Climate and Forecast Standard Names"
    - "sea_water_pressure"   # found in "Climate and Forecast Standard Names"
    - "sea_water_temperature"   # found in "Climate and Forecast Standard Names"
    - # GCMD Science keywords
    - "EARTH SCIENCE > OCEANS > SALINITY/DENSITY > SALINITY"
    - "EARTH SCIENCE > OCEANS > OCEAN TEMPERATURE > WATER TEMPERATURE"
    - "EARTH SCIENCE > OCEANS > OCEAN PRESSURE > WATER PRESSURE"
    - # GEMET
    - "physical oceanography"
    - "meteorology"

  keywords_vocabulary:  # The following vocabularies have been detected:
     - GEMET
     - Climate and Forecast Standard Names
     - GCMD Science Keywords
     - SeaDataNet Parameter Discovery Vocabulary
     - SeaDataNet device categories
     - Observatories of the Seas Ontology
     - SeaVoX Platform Categories

  keywords_vocabulary_uri: # The following vocabularies have been detected:
    - https://www.eionet.europa.eu/gemet/
    - https://vocab.nerc.ac.uk/collection/P07/current/
    - https://gcmd.earthdata.nasa.gov/
    - https://vocab.nerc.ac.uk/collection/P02/current/
    - https://vocab.nerc.ac.uk/collection/L05/current/
    - https://earthportal.eu/ontologies/OSO
    - https://vocab.nerc.ac.uk/collection/L06/current/



platforms:
  OBSEA_seabed_station:
    long_name: "OBSEA seabed station"  # human-readable long name of the platform
    wmo_platform_code: "6103565"  # (optional) World Meteorological Organization platform number
    emso_platform_name: "OBSEA seabed station"  # link to the OSO ontology
    platform_type_name: "mooring"  # Platform type from the L06 vocabulary
    platform_type_uri: "http://vocab.nerc.ac.uk/collection/L06/current/48/"  # Link to an instance of the L06 vocabulary
    platform_reference: "https://obsea.es"  # (optional) uri where more information can be obtained
    # (optional) other relevant information
    comment: "The seafloor section of the OBSEA multiparametric cabled observatory seafloor observatory, located at NW mediterranean sea"

    # Nominal coordinates, deployment variables or real-time GPS coordinates can be provided in the data with the
    # precise_latitude/precise_longitude variable, (standard name: deployment_latitude, P01 code: ALATGP01).
    latitude: 41.18212  # nominal latitude
    longitude: 1.75257  # nominal longitude

sensors:
  SBE37SMP_SN47472_5496:
    long_name: "Sea-Bird Scientific SBE37 SMP CTD Sensor"  # human-readable name
    sensor_serial_number: "37SMP47472-5496"
    sensor_mount: "mounted_on_seafloor_structure"  # mounting from a controlled list
    sensor_orientation: "upward"  # (optional) only relevant for ADCPs
    sdn_instrument_uri: "https://vocab.nerc.ac.uk/collection/L22/current/TOOL1457"
    sensor_manufacturer_uri: "http://vocab.nerc.ac.uk/collection/L35/current/MAN0013/"
    sensor_type_uri: "http://vocab.nerc.ac.uk/collection/L05/current/130/"
    sensor_reference: "https://www.seabird.com/moored/sbe-37-sm-smp-smp-odo-microcat/family?productCategoryId=54627473786"

  SBE16_SN57353_6479:
    long_name: "Sea-Bird 16Plus V2"  # human-readable name
    sensor_serial_number: "57353_6479"
    sensor_mount: "mounted_on_mooring_line"  # mounting from a controlled list
    sensor_orientation: "upward"  # (optional) only relevant for ADCPs
    sdn_instrument_uri: "https://vocab.nerc.ac.uk/collection/L22/current/TOOL0870"
    sensor_type_uri: "http://vocab.nerc.ac.uk/collection/L05/current/130/"
    sensor_manufacturer_uri: "http://vocab.nerc.ac.uk/collection/L35/current/MAN0013/"
    sensor_reference: "https://www.seabird.com/sbe-16plus-v2-seacat/product?id=60761421598"


variables:
  TEMP:
    long_name: "sea water temperature"
    sdn_parameter_uri: "http://vocab.nerc.ac.uk/collection/P01/current/TEMPST01"
    sdn_uom_uri: "http://vocab.nerc.ac.uk/collection/P06/current/UPAA/"
    standard_name: "sea_water_temperature"
  PRES:
    long_name: "sea water pressure"
    sdn_parameter_uri: "http://vocab.nerc.ac.uk/collection/P01/current/PRESPR01"
    sdn_uom_uri: "http://vocab.nerc.ac.uk/collection/P06/current/UPDB/"
    standard_name: "sea_water_pressure"

  CNDC:
    long_name: "sea water electrical conductivity"
    sdn_parameter_uri: "http://vocab.nerc.ac.uk/collection/P01/current/CNDCST01"
    sdn_uom_uri: "http://vocab.nerc.ac.uk/collection/P06/current/UECA/"
    standard_name: "sea_water_electrical_conductivity"

  PSAL:
    long_name: "sea water salinity"
    sdn_parameter_uri: "http://vocab.nerc.ac.uk/collection/P01/current/PRESPR01"
    sdn_uom_uri: "http://vocab.nerc.ac.uk/collection/P06/current/UPDB/"
    standard_name: "sea_water_pressure"

  SVEL:
    long_name: "speed of sound in sea water"
    sdn_parameter_uri: "http://vocab.nerc.ac.uk/collection/P01/current/SVELCT01"
    sdn_uom_uri: "http://vocab.nerc.ac.uk/collection/P06/current/UVAA/"
    standard_name: "speed_of_sound_in_sea_water"
